{% load static %}
<h2>ĐANG XÁC NHẬN THANH TOÁN...</h2>

<script type="module">
    import { protectedFetch } from "{% static 'js/modules/generalApi.js' %}";
    (async function () {
        const params = new URLSearchParams(window.location.search);
        const paypalId = params.get("token");

        if (!paypalId) {
            window.location.href = "/orders-failed/";
            return;
        }

        try {
            const data = await protectedFetch("/api/payments/verify/", {
                method: "POST",
                body: JSON.stringify({
                    paypal_id: paypalId
                })
            });

            if (data.status === "paid" || data.status === "already_paid") {
                window.location.href = "/my-tickets/";
            } else {
                window.location.href = "/orders-failed/";
            }

        } catch (err) {
            console.error(err);
            window.location.href = "/orders-failed/";
        }
    })();
</script>
